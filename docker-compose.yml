services:
  mariadb:
    image: mariadb:11
    container_name: mcp-mariadb-demo
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: mcp_demo
      MARIADB_USER: demo_user
      MARIADB_PASSWORD: demo_password
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mariadb_data:
